name: "AccuKnox xBOM Scan"

description: >
  Generate an xBOM (SBOM / CBOM / AIBOM) using knoxctl, and upload to the AccuKnox Dashboard

author: "AccuKnox"

branding:
  icon: "shield"
  color: "blue"

inputs:

  bom-type:
    description: "sbom | cbom | aibom"
    required: false
    default: "sbom"

  path:
    description: "Directory to scan. Ignored when image is set."
    required: false
    default: "."

  image:
    description: "Container image reference (e.g. myapp:abc1234). Build with any tool (docker, podman, buildah, ko). The build step must run in the same job as this action."
    required: false
    default: ""

  cbom-plugins:
    description: "Comma-separated list of CBOM plugins to run (e.g. certificates,keys). Omit to scan all."
    required: false
    default: ""

  aibom-source:
    description: "huggingface | bedrock. Source for AIBOM generation."
    required: false
    default: "huggingface"

  aibom-model:
    description: "HuggingFace model name (e.g. meta-llama/Llama-2-7b). Required when bom-type=aibom and aibom-source=huggingface."
    required: false
    default: ""

  aws-region:
    description: "AWS region for Bedrock scan (e.g. us-east-1). Required when aibom-source=bedrock."
    required: false
    default: ""

  aws-access-key-id:
    description: "AWS access key ID. Required when aibom-source=bedrock."
    required: false
    default: ""

  aws-secret-access-key:
    description: "AWS secret access key. Required when aibom-source=bedrock."
    required: false
    default: ""

  sign:
    description: "Sign the BOM with cosign using an ephemeral key (--sign --sign-generate-key). Supported on SBOM, CBOM, and AIBOM."
    required: false
    default: "false"

  token:
    description: "AccuKnox artifact token. https://help.accuknox.com/how-to/how-to-create-tokens/"
    required: true

  endpoint:
    description: "AccuKnox SaaS hostname, e.g. cspm.accuknox.com"
    required: true

  label:
    description: "AccuKnox label. https://help.accuknox.com/how-to/how-to-create-labels/"
    required: true

  project-name:
    description: "AccuKnox project name (Console → SBOM → Projects)."
    required: true

  project-classifier:
    description: "project_classifier in the BOM (e.g. container, application, firmware)."
    required: true

  output-file:
    description: "Local path to write the BOM file. Auto-derived when omitted: <repo>-<bom-type>.json"
    required: false
    default: ""

outputs:

  bom-file:
    description: "Path to the generated BOM file on the runner."
    value: ${{ steps.names.outputs.bom_file }}

  upload-status:
    description: "HTTP status code from the AccuKnox SaaS upload."
    value: ${{ steps.upload-saas.outputs.http_status }}

runs:
  using: "composite"
  steps:

    # ── 0. Validate inputs ────────────────────────────────────────────────────
    - name: Validate inputs
      shell: bash
      run: |
        set -e

        case "${{ inputs.bom-type }}" in
          sbom|cbom|aibom) ;;
          *) echo "::error::bom-type must be sbom, cbom, or aibom (got '${{ inputs.bom-type }}')"; exit 1 ;;
        esac

        case "${{ inputs.sign }}" in
          true|false) ;;
          *) echo "::error::sign must be 'true' or 'false' (got '${{ inputs.sign }}')"; exit 1 ;;
        esac

        if [ "${{ inputs.bom-type }}" = "aibom" ]; then
          case "${{ inputs.aibom-source }}" in
            huggingface|bedrock) ;;
            *) echo "::error::aibom-source must be 'huggingface' or 'bedrock' (got '${{ inputs.aibom-source }}')"; exit 1 ;;
          esac
        fi

        if [ -n "${{ inputs.image }}" ] && [ "${{ inputs.path }}" != "." ]; then
          echo "::warning::Both image and a non-default path were provided. image takes precedence; path is ignored."
        fi

        echo "Inputs validated."

    # ── 1. Download knoxctl ───────────────────────────────────────────────────
    - name: Download knoxctl
      shell: bash
      run: |
        set -e
        BIN_DIR="$RUNNER_TEMP/knoxctl-bin"
        mkdir -p "$BIN_DIR"
        curl -fL \
          "https://github.com/accuknox/accuknox-cli-v2/releases/download/v0.10.0/knoxctl_0.10.0_linux_amd64.tar.gz" \
          -o "$RUNNER_TEMP/knoxctl.tar.gz"
        tar -xzf "$RUNNER_TEMP/knoxctl.tar.gz" -C "$BIN_DIR"
        chmod +x "$BIN_DIR/knoxctl"
        echo "$BIN_DIR" >> "$GITHUB_PATH"
        export PATH="$BIN_DIR:$PATH"
        knoxctl version

    # ── 2. Resolve BOM output path ────────────────────────────────────────────
    - name: Resolve output path
      id: names
      shell: bash
      run: |
        set -e
        if [ -n "${{ inputs.output-file }}" ]; then
          BOM_FILE="${{ inputs.output-file }}"
        else
          REPO_SLUG=$(echo "${GITHUB_REPOSITORY}" | tr '/' '-')
          BOM_FILE="${GITHUB_WORKSPACE}/${REPO_SLUG}-${{ inputs.bom-type }}.json"
        fi
        echo "bom_file=${BOM_FILE}" >> "$GITHUB_OUTPUT"

    # ── 3a. SBOM ──────────────────────────────────────────────────────────────
    - name: "SBOM"
      if: inputs.bom-type == 'sbom'
      shell: bash
      run: |
        set -e
        BOM_FILE="${{ steps.names.outputs.bom_file }}"

        SIGN_FLAGS=""
        if [ "${{ inputs.sign }}" = "true" ]; then
          SIGN_FLAGS="--sign --sign-generate-key"
          echo "Signing enabled (ephemeral key)"
        fi

        if [ -n "${{ inputs.image }}" ]; then
          SOURCE="${{ inputs.image }}"
        else
          SOURCE="${{ inputs.path }}"
        fi

        echo "SBOM source: $SOURCE"
        knoxctl pkgscan scan "$SOURCE" \
          -o "cyclonedx-json=${BOM_FILE}" \
          $SIGN_FLAGS \
          --quiet

    # ── 3b. CBOM ──────────────────────────────────────────────────────────────
    - name: "CBOM"
      if: inputs.bom-type == 'cbom'
      shell: bash
      run: |
        set -e
        BOM_FILE="${{ steps.names.outputs.bom_file }}"

        SIGN_FLAGS=""
        if [ "${{ inputs.sign }}" = "true" ]; then
          SIGN_FLAGS="--sign --sign-generate-key"
          echo "Signing enabled (ephemeral key)"
        fi

        PLUGINS_FLAG=""
        if [ -n "${{ inputs.cbom-plugins }}" ]; then
          CLEAN_PLUGINS=$(echo "${{ inputs.cbom-plugins }}" | tr -d '[:space:]')
          PLUGINS_FLAG="--plugins $CLEAN_PLUGINS"
          echo "CBOM plugins: $CLEAN_PLUGINS"
        fi

        if [ -n "${{ inputs.image }}" ]; then
          echo "CBOM scanning image: ${{ inputs.image }}"
          knoxctl cbom image \
            --image  "${{ inputs.image }}" \
            --out    "$BOM_FILE" \
            --format json \
            $PLUGINS_FLAG \
            $SIGN_FLAGS
        else
          echo "CBOM scanning source: ${{ inputs.path }}"
          knoxctl cbom source "${{ inputs.path }}" \
            --out    "$BOM_FILE" \
            --format json \
            $PLUGINS_FLAG \
            $SIGN_FLAGS
        fi

    # ── 3c. AIBOM ─────────────────────────────────────────────────────────────
    - name: "AIBOM"
      if: inputs.bom-type == 'aibom'
      shell: bash
      run: |
        set -e
        BOM_FILE="${{ steps.names.outputs.bom_file }}"

        SIGN_FLAGS=""
        if [ "${{ inputs.sign }}" = "true" ]; then
          SIGN_FLAGS="--sign --sign-generate-key"
          echo "Signing enabled (ephemeral key)"
        fi

        if [ "${{ inputs.aibom-source }}" = "bedrock" ]; then
          if [ -z "${{ inputs.aws-region }}" ] \
             || [ -z "${{ inputs.aws-access-key-id }}" ] \
             || [ -z "${{ inputs.aws-secret-access-key }}" ]; then
            echo "::error::aws-region, aws-access-key-id, and aws-secret-access-key are required when aibom-source=bedrock"
            exit 1
          fi

          echo "AIBOM scanning AWS Bedrock in region: ${{ inputs.aws-region }}"
          knoxctl aibom bedrock \
            --region            "${{ inputs.aws-region }}" \
            --access-key-id     "${{ inputs.aws-access-key-id }}" \
            --secret-access-key "${{ inputs.aws-secret-access-key }}" \
            --out               "$BOM_FILE" \
            --format            json \
            $SIGN_FLAGS

        else
          if [ -z "${{ inputs.aibom-model }}" ]; then
            echo "::error::aibom-model is required when bom-type=aibom and aibom-source=huggingface"
            exit 1
          fi

          echo "AIBOM scanning HuggingFace model: ${{ inputs.aibom-model }}"
          knoxctl aibom generate \
            --model  "${{ inputs.aibom-model }}" \
            --out    "$BOM_FILE" \
            --format json \
            $SIGN_FLAGS
        fi

    # ── 4. Validate BOM file ──────────────────────────────────────────────────
    - name: Validate BOM file
      shell: bash
      env:
        BOM_FILE: ${{ steps.names.outputs.bom_file }}
      run: |
        set -e
        if [ ! -f "$BOM_FILE" ]; then
          echo "::error::BOM file not found at $BOM_FILE — scan did not write output"
          exit 1
        fi
        SIZE=$(stat -c%s "$BOM_FILE")
        if [ "$SIZE" -lt 50 ]; then
          echo "::error::BOM file is suspiciously small ($SIZE bytes)"
          head -c 500 "$BOM_FILE" || true
          exit 1
        fi
        if ! jq empty "$BOM_FILE" 2>/dev/null; then
          echo "::error::BOM file is not valid JSON. First 500 bytes:"
          head -c 500 "$BOM_FILE" || true
          exit 1
        fi
        echo "BOM file OK ($SIZE bytes, valid JSON)"

    # ── 5. Patch BOM JSON ─────────────────────────────────────────────────────
    # Step A → rename metadata.component.name when it is "." (raw scan target → repo name)
    # Step B → inject project_name and project_classifier at top, preserving $schema
    - name: Patch BOM JSON
      shell: bash
      env:
        BOM_FILE:   ${{ steps.names.outputs.bom_file }}
        PROJECT:    ${{ inputs.project-name }}
        CLASSIFIER: ${{ inputs.project-classifier }}
      run: |
        set -e
        REPO_NAME="${GITHUB_REPOSITORY##*/}"
        TMP="${BOM_FILE}.tmp"

        echo "Patching BOM"
        echo "  file:       $BOM_FILE"
        echo "  project:    $PROJECT"
        echo "  classifier: $CLASSIFIER"
        echo "  repo:       $REPO_NAME"

        echo "=== BEFORE ==="
        jq '{root_name: .metadata.component.name}' "$BOM_FILE"

        jq --arg repo "$REPO_NAME" '
          if (.metadata.component.name? == ".") then
            .metadata.component.name = $repo
          else . end
        ' "$BOM_FILE" > "$TMP"
        mv "$TMP" "$BOM_FILE"

        jq --arg project "$PROJECT" --arg classifier "$CLASSIFIER" '
          ( if has("$schema") then {"$schema": .["$schema"]} else {} end )
          + {"project_name": $project, "project_classifier": $classifier}
          + ( del(.["$schema"]) )
        ' "$BOM_FILE" > "$TMP"
        mv "$TMP" "$BOM_FILE"

        echo "=== AFTER ==="
        jq '{
          schema:     ."$schema",
          project:    .project_name,
          classifier: .project_classifier,
          root_name:  .metadata.component.name
        }' "$BOM_FILE"

    # ── 6. Upload to AccuKnox SaaS ────────────────────────────────────────────
    - name: Upload to AccuKnox SaaS
      id: upload-saas
      shell: bash
      env:
        AK_TOKEN:    ${{ inputs.token }}
        AK_ENDPOINT: ${{ inputs.endpoint }}
        AK_LABEL:    ${{ inputs.label }}
        BOM_FILE:    ${{ steps.names.outputs.bom_file }}
      run: |
        set -e
        HTTP_STATUS=$(curl --location \
          "https://${AK_ENDPOINT}/api/v1/artifact/?data_type=SBOM&save_to_s3=True&label_id=${AK_LABEL}" \
          --header "Authorization: Bearer ${AK_TOKEN}" \
          --form "file=@${BOM_FILE}" \
          --output /tmp/ak_response.json \
          --write-out "%{http_code}" \
          --insecure)

        echo "http_status=${HTTP_STATUS}" >> "$GITHUB_OUTPUT"
        cat /tmp/ak_response.json
        echo

        if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
          echo "::error::Upload failed (HTTP ${HTTP_STATUS})"
          exit 1
        fi

    # ── 7. Save BOM artefact ──────────────────────────────────────────────────
    - name: Save BOM artefact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.repository_owner }}-${{ inputs.bom-type }}-${{ github.run_number }}
        path: ${{ steps.names.outputs.bom_file }}
        retention-days: 30
        if-no-files-found: warn
